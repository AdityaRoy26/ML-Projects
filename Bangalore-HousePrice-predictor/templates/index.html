<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Bangalore House Price Predictor</title>

    <style>
        body{
            font-family: Arial, sans-serif;
            background-color:#f4f4f4;
            display:flex;
            justify-content:center;
            align-items:center;
            height:100vh;
        }

        .container{
            background:white;
            padding:30px;
            border-radius:10px;
            box-shadow:0px 0px 10px rgba(0,0,0,0.2);
            width:400px;
        }

        h1{
            text-align:center;
            margin-bottom:20px;
        }

        label{
            font-weight:bold;
        }

        input,select{
            width:100%;
            padding:10px;
            margin-top:5px;
            margin-bottom:15px;
            border:1px solid #ccc;
            border-radius:5px;
        }

        button{
            width:100%;
            padding:10px;
            background:#007bff;
            color:white;
            border:none;
            border-radius:5px;
            cursor:pointer;
        }

        button:hover{
            background:#0056b3;
        }

        .result{
            margin-top:20px;
            text-align:center;
            font-size:20px;
            font-weight:bold;
            color:green;
        }
    </style>

</head>
<body>

<div class="container">

    <h1>Bangalore House Price Predictor</h1>

    <form action="/predict" method="POST">

        <label>Location</label>

        <select name="location" required>

            {% for location in locations %}
                <option value="{{location}}">
                    {{location}}
                </option>
            {% endfor %}

        </select>

        <label>Total Square Feet</label>
        <input type="number"
               name="total_sqft"
               step="0.1"
               required>

        <label>Bathrooms</label>
        <input type="number"
               name="bath"
               required>

        <label>BHK</label>
        <input type="number"
               name="bhk"
               required>

        <button type="submit">
            Predict Price
        </button>

    </form>

    {% if prediction %}

    <div class="result">
        Estimated Price : ₹ {{prediction}} Lakhs
    </div>

    {% endif %}

</div>

</body>
</html>
